<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Classroom Assistant</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">AP Classroom Assistant</h1>
                <div class="header-actions">
                    <button id="refreshBtn" class="btn btn-secondary" title="Refresh assignments">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="m3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                    <button id="settingsBtn" class="btn btn-secondary" title="Settings">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="m12 1 1.09 3.64A5.61 5.61 0 0 1 15.64 8L19.28 9.1A5.61 5.61 0 0 1 21.9 14.9L19.28 16a5.61 5.61 0 0 1-2.55 3.36L15.64 23a5.61 5.61 0 0 1-7.28 0L7.27 19.36A5.61 5.61 0 0 1 4.72 16L1.1 14.9A5.61 5.61 0 0 1 2.72 9.1L4.72 8a5.61 5.61 0 0 1 2.55-3.36L8.36 1a5.61 5.61 0 0 1 7.28 0z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Session Status -->
        <div class="status-bar">
            <div id="sessionStatus" class="status-indicator">
                <span class="status-dot status-active"></span>
                <span class="status-text">Session Active</span>
            </div>
            <div id="lastUpdate" class="last-update">
                Last updated: <span id="updateTime">Never</span>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="assignments">Active Assignments</button>
            <button class="tab-btn" data-tab="classrooms">Classrooms</button>
        </nav>

        <!-- Content Area -->
        <main class="content">
            <!-- Active Assignments Tab -->
            <div id="assignments-tab" class="tab-content active">
                <div id="assignmentsContainer" class="assignments-container">
                    <!-- Loading state -->
                    <div id="loadingState" class="loading-state">
                        <div class="loading-spinner"></div>
                        <p>Loading assignments...</p>
                    </div>
                    
                    <!-- Empty state -->
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14,2 14,8 20,8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10,9 9,9 8,9"></polyline>
                        </svg>
                        <h3>No Active Assignments</h3>
                        <p>No active assignments found. Try refreshing or visit your AP Classroom pages.</p>
                        <button id="visitClassroomBtn" class="btn btn-primary">Visit AP Classroom</button>
                    </div>
                    
                    <!-- Assignments list -->
                    <div id="assignmentsList" class="assignments-list" style="display: none;">
                        <!-- Dynamic content will be populated here -->
                    </div>
                </div>
            </div>

            <!-- Classrooms Tab -->
            <div id="classrooms-tab" class="tab-content">
                <div id="classroomsContainer" class="classrooms-container">
                    <div id="classroomsList" class="classrooms-list">
                        <!-- Dynamic content will be populated here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <span class="version">v1.0.0</span>
                <div class="footer-actions">
                    <button id="helpBtn" class="btn-link">Help</button>
                    <span class="separator">•</span>
                    <button id="aboutBtn" class="btn-link">About</button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="closeSettings" class="btn-close">×</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <h3>Session Management</h3>
                    <div class="setting-item">
                        <label class="setting-label">
                            <input type="checkbox" id="autoKeepAlive" checked>
                            <span class="checkmark"></span>
                            Keep session alive automatically
                        </label>
                        <p class="setting-description">Prevents automatic logout from College Board</p>
                    </div>
                    <div class="setting-item">
                        <label class="setting-label">
                            Keep-alive interval (minutes):
                            <select id="keepAliveInterval">
                                <option value="5">5</option>
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="30">30</option>
                            </select>
                        </label>
                    </div>
                </div>
                <div class="setting-group">
                    <h3>Notifications</h3>
                    <div class="setting-item">
                        <label class="setting-label">
                            <input type="checkbox" id="assignmentNotifications" checked>
                            <span class="checkmark"></span>
                            Notify about new assignments
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettings" class="btn btn-primary">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
